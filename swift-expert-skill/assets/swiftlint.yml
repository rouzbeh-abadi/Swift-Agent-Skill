disabled_rules:
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - redundant_optional_initialization
  - vertical_whitespace

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 800

reporter: "xcode"
